openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: DoD AI Tool Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Profile
    description: Service member profile and AI-assisted profile builder.
  - name: Catalog
    description: Public-facing tool catalog and favorites.
  - name: Library
    description: Personal RAG library — doctrine, SOPs, FMs.
  - name: Launch
    description: Tool launch + token-based context exchange.
  - name: Admin
    description: Admin tool and category CRUD.
  - name: Submissions
    description: Vendor tool submissions and admin review queue.
  - name: Dashboard
    description: Aggregated dashboard summaries.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ---------- Auth ----------
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthUserEnvelope' }
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema: { type: string }
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string }
        - name: state
          in: query
          required: false
          schema: { type: string }
        - name: iss
          in: query
          required: false
          schema: { type: string, format: uri }
      responses:
        '302':
          description: Redirect to the returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MobileTokenExchangeRequest' }
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MobileTokenExchangeSuccess' }
        '400':
          description: Bad request.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LogoutSuccess' }

  # ---------- Profile ----------
  /profile:
    get:
      tags: [Profile]
      operationId: getMyProfile
      summary: Get the current user's profile
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    put:
      tags: [Profile]
      operationId: updateMyProfile
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileUpdate' }
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/chat:
    get:
      tags: [Profile]
      operationId: getProfileChatHistory
      summary: Get profile-builder chat history
      responses:
        '200':
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChatMessage' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    post:
      tags: [Profile]
      operationId: sendProfileChat
      summary: Send a message to the profile-builder assistant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileChatRequest' }
      responses:
        '200':
          description: Assistant reply (with optional structured profile suggestion)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileChatResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/chat/reset:
    post:
      tags: [Profile]
      operationId: resetProfileChat
      summary: Clear profile-builder chat history
      responses:
        '200':
          description: Reset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/context-block/evaluate:
    post:
      tags: [Profile]
      operationId: evaluateContextBlock
      summary: Score a candidate 6-element Context Block without persisting it
      description: >
        Runs the Semantic NLP Evaluator against the supplied 6 elements
        and returns the per-criterion scores, total /12, GO/NO-GO status,
        and any OPSEC flag. Does not modify the operator's stored block.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContextBlockFields' }
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextBlockEvaluation' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          description: Evaluator unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/context-block/confirm:
    post:
      tags: [Profile]
      operationId: confirmContextBlock
      summary: Save a 6-element Context Block (server re-evaluates and rejects NO-GO)
      description: >
        Re-runs the Semantic NLP Evaluator server-side, rejects NO-GO and
        OPSEC-flagged submissions, and persists the 6 fields plus the
        latest score and confirmed-at timestamp on the operator's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContextBlockFields' }
      responses:
        '200':
          description: Confirmed Context Block state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextBlockConfirmation' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          description: NO-GO — context block did not meet the 10/12 threshold or tripped OPSEC
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmContextBlockRejection' }
        '500':
          description: Evaluator unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Presets ----------
  /profile/presets:
    get:
      tags: [Profile]
      operationId: listMyPresets
      summary: List the current user's mission presets
      responses:
        '200':
          description: Presets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MissionPreset' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    post:
      tags: [Profile]
      operationId: createMyPreset
      summary: Create a new mission preset (snapshots the current profile by default)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MissionPresetCreate' }
      responses:
        '200':
          description: Created preset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MissionPreset' }
        '400':
          description: Invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/presets/{id}:
    put:
      tags: [Profile]
      operationId: updateMyPreset
      summary: Update a preset's name, description, snapshot, or document scope
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MissionPresetUpdate' }
      responses:
        '200':
          description: Updated preset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MissionPreset' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Profile]
      operationId: deleteMyPreset
      summary: Delete a preset (the user must always have at least one)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted, with the new active preset id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresetDeleteResponse' }
        '400':
          description: Cannot delete the only remaining preset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/presets/{id}/duplicate:
    post:
      tags: [Profile]
      operationId: duplicateMyPreset
      summary: Duplicate an existing preset (snapshot + document scope)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Duplicated preset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MissionPreset' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/presets/{id}/activate:
    post:
      tags: [Profile]
      operationId: activateMyPreset
      summary: Set a preset as the user's active preset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Activated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MissionPreset' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Catalog ----------
  /catalog/categories:
    get:
      tags: [Catalog]
      operationId: listCategories
      summary: List all tool categories
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }
  /catalog/tools:
    get:
      tags: [Catalog]
      operationId: listTools
      summary: List/search catalog tools
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: category
          in: query
          required: false
          schema: { type: string }
        - name: ato_status
          in: query
          required: false
          schema: { type: string }
        - name: impact_level
          in: query
          required: false
          schema: { type: string }
        - name: favorites_only
          in: query
          required: false
          schema: { type: boolean }
      responses:
        '200':
          description: Tools
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ToolSummary' }
  /catalog/tools/{slug}:
    get:
      tags: [Catalog]
      operationId: getToolBySlug
      summary: Get a tool by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tool
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ToolDetail' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /catalog/favorites/{toolId}:
    post:
      tags: [Catalog]
      operationId: addFavorite
      summary: Favorite a tool
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Favorited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Catalog]
      operationId: removeFavorite
      summary: Unfavorite a tool
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Unfavorited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Library ----------
  /library/stats:
    get:
      tags: [Library]
      operationId: getLibraryStats
      summary: Stats for the user's RAG library
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryStats' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/documents:
    get:
      tags: [Library]
      operationId: listDocuments
      summary: List the user's documents
      parameters:
        - name: presetId
          in: query
          required: false
          description: >
            When set, only return documents currently linked to that mission preset.
          schema: { type: string }
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DocumentSummary' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    post:
      tags: [Library]
      operationId: uploadTextDocument
      summary: Upload a document by sending its raw text (for plain-text uploads)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TextDocumentUploadRequest' }
      responses:
        '200':
          description: Created document
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentSummary' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/auto-ingest:
    post:
      tags: [Library]
      operationId: triggerAutoIngest
      summary: Trigger auto-ingest of a curated MOS or Unit doctrine package
      description: >
        Looks up the curated doctrine package for the given source
        ("mos:<branch>:<code>" or "unit:<branch>:<id>"), downloads each
        public-doctrine URL server-side, extracts and chunks it, and
        inserts the new docs into the user's library. Existing docs with
        the same source URL are skipped, so re-running this is safe and
        idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AutoIngestRequest' }
      responses:
        '200':
          description: Ingest finished synchronously
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoIngestSummary' }
        '400':
          description: Bad request (no curated package for source)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/auto-ingest/status:
    get:
      tags: [Library]
      operationId: getAutoIngestStatus
      summary: Poll the most recent auto-ingest job for a source
      parameters:
        - name: source
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Status (or null when no job exists)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoIngestStatusResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/test-query:
    post:
      tags: [Library]
      operationId: testLibraryQuery
      summary: Run a sample RAG query against the user's own library (dry-run)
      description: >
        Lets the signed-in user verify their library is returning useful
        snippets BEFORE trusting it with a tool launch. Identical retrieval
        path to the launch-token-scoped /tools/library-query endpoint, but
        scoped to the current authenticated user instead of a session token.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryTestQueryRequest' }
      responses:
        '200':
          description: Snippets
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryTestQueryResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/documents/{id}:
    get:
      tags: [Library]
      operationId: getDocument
      summary: Get document metadata + first chunks
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Document detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentDetail' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Library]
      operationId: deleteDocument
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /library/documents/{id}/presets:
    put:
      tags: [Library]
      operationId: setDocumentPresetTags
      summary: Replace the set of presets a document belongs to
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DocumentPresetTagsUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentSummary' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Launch ----------
  /tools/{toolId}/launch:
    post:
      tags: [Launch]
      operationId: launchTool
      summary: Initiate a tool launch (issues a single-use launch token)
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Launch initiated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LaunchInitiateResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /tools/context-exchange:
    post:
      tags: [Launch]
      operationId: exchangeContextToken
      summary: Tool exchanges a launch token for the user's context bundle and a session token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContextExchangeRequest' }
      responses:
        '200':
          description: Context bundle
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextExchangeResponse' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /tools/library-query:
    post:
      tags: [Launch]
      operationId: queryLibrary
      summary: Tool queries the user's library with a session token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryQueryRequest' }
      responses:
        '200':
          description: Snippets
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryQueryResponse' }
        '401':
          description: Invalid session token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /launches/recent:
    get:
      tags: [Launch]
      operationId: listRecentLaunches
      summary: List the user's recent tool launches
      responses:
        '200':
          description: Launches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LaunchHistoryItem' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Admin ----------
  /admin/tools:
    get:
      tags: [Admin]
      operationId: adminListTools
      summary: Admin list of all tools (including inactive)
      responses:
        '200':
          description: Tools
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ToolDetail' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    post:
      tags: [Admin]
      operationId: createTool
      summary: Create a new tool
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ToolUpsert' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ToolDetail' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/tools/{id}:
    put:
      tags: [Admin]
      operationId: updateTool
      summary: Update a tool
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ToolUpsert' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ToolDetail' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Admin]
      operationId: deleteTool
      summary: Delete a tool
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Submissions ----------
  /submissions:
    get:
      tags: [Submissions]
      operationId: listMySubmissions
      summary: List the current user's tool submissions
      responses:
        '200':
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SubmissionSummary' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    post:
      tags: [Submissions]
      operationId: createSubmission
      summary: Submit a new tool for admin review
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmissionUpsert' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionDetail' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /submissions/{id}:
    get:
      tags: [Submissions]
      operationId: getMySubmission
      summary: Get one of the current user's submissions
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Submission detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionDetail' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    put:
      tags: [Submissions]
      operationId: updateMySubmission
      summary: Update or resubmit a pending or changes-requested submission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmissionUpsert' }
      responses:
        '200':
          description: Updated submission (status reset to pending)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionDetail' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403':
          description: Forbidden — submission not editable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /submissions/{id}/withdraw:
    post:
      tags: [Submissions]
      operationId: withdrawMySubmission
      summary: Withdraw a pending or changes-requested submission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Withdrawn
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionDetail' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/submissions:
    get:
      tags: [Submissions]
      operationId: adminListSubmissions
      summary: Admin review queue (pending and changes-requested submissions)
      responses:
        '200':
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SubmissionDetail' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/submissions/{id}/review:
    post:
      tags: [Submissions]
      operationId: reviewSubmission
      summary: Approve, request changes on, or reject a submission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmissionReviewRequest' }
      responses:
        '200':
          description: Reviewed submission
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionDetail' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Dashboard ----------
  /dashboard/summary:
    get:
      tags: [Dashboard]
      operationId: getDashboardSummary
      summary: Aggregated dashboard summary
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardSummary' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema: { type: string }
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema: { type: string }
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    SimpleSuccess:
      type: object
      required: [success]
      properties:
        success: { type: boolean }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { type: string }

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id: { type: string }
        email: { type: [string, 'null'], format: email }
        firstName: { type: [string, 'null'] }
        lastName: { type: [string, 'null'] }
        profileImageUrl: { type: [string, 'null'] }

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code: { type: string, minLength: 1 }
        code_verifier: { type: string, minLength: 1 }
        redirect_uri: { type: string, minLength: 1, format: uri }
        state: { type: string, minLength: 1 }
        nonce: { type: string, minLength: 1 }

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token: { type: string }

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success: { type: boolean, const: true }

    UserProfile:
      type: object
      required:
        [userId, branch, rank, mosCode, dutyTitle, unit, baseLocation,
         securityClearance, deploymentStatus, primaryMission,
         aiUseCases, freeFormContext, isAdmin, completenessPct,
         contextBlock, activePresetId, updatedAt]
      properties:
        userId: { type: string }
        branch: { type: [string, 'null'] }
        rank: { type: [string, 'null'] }
        mosCode: { type: [string, 'null'] }
        dutyTitle: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        baseLocation: { type: [string, 'null'] }
        securityClearance: { type: [string, 'null'] }
        deploymentStatus: { type: [string, 'null'] }
        primaryMission: { type: [string, 'null'] }
        aiUseCases:
          type: array
          items: { type: string }
        freeFormContext: { type: [string, 'null'] }
        isAdmin: { type: boolean }
        completenessPct: { type: integer }
        contextBlock: { $ref: '#/components/schemas/ContextBlockState' }
        activePresetId: { type: [string, 'null'] }
        updatedAt: { type: string, format: date-time }

    ContextBlockFields:
      type: object
      required: [doctrine, intent, environment, constraints, risk, experience]
      properties:
        doctrine:
          type: string
          description: Element 1 — Doctrine & Orders cited (e.g. MCDP-4, unit SOPs).
        intent:
          type: string
          description: Element 2 — Commander's intent for this task.
        environment:
          type: string
          description: Element 3 — Operational environment.
        constraints:
          type: string
          description: Element 4 — Constraints & limitations.
        risk:
          type: string
          description: Element 5 — Risk if the LLM hallucinates.
        experience:
          type: string
          description: Element 6 — Human experience & judgment AI cannot infer.

    ContextBlockScores:
      type: object
      required: [doctrine, environment, constraints, experience]
      properties:
        doctrine: { type: integer, description: Criterion 1 score (1-3). }
        environment:
          type: integer
          description: Criterion 2 — environment & commander's intent (1-3).
        constraints:
          type: integer
          description: Criterion 3 — constraints, limitations & risk (1-3).
        experience: { type: integer, description: Criterion 4 score (1-3). }

    ContextBlockEvaluation:
      type: object
      required: [submissionId, scores, totalScore, status, opsecFlag, flags]
      properties:
        submissionId: { type: string }
        scores: { $ref: '#/components/schemas/ContextBlockScores' }
        totalScore:
          type: integer
          description: Sum of the four criteria, /12. Forced to 0 on OPSEC violations.
        status:
          type: string
          description: '"GO" when totalScore >= 10 and OPSEC clean, else "NO-GO".'
        opsecFlag:
          type: boolean
          description: True if the submission tripped the OPSEC fail-safe.
        flags:
          type: string
          description: Brief description of OPSEC violation or ambiguity, "None" otherwise.

    ContextBlockState:
      type: object
      required:
        [doctrine, intent, environment, constraints, risk, experience,
         confirmedAt, lastEvaluation]
      properties:
        doctrine: { type: [string, 'null'] }
        intent: { type: [string, 'null'] }
        environment: { type: [string, 'null'] }
        constraints: { type: [string, 'null'] }
        risk: { type: [string, 'null'] }
        experience: { type: [string, 'null'] }
        confirmedAt:
          type: [string, 'null']
          format: date-time
          description: When the operator last accepted this Context Block.
        lastEvaluation:
          oneOf:
            - $ref: '#/components/schemas/ContextBlockEvaluation'
            - type: 'null'

    ContextBlockConfirmation:
      type: object
      required: [profile, evaluation]
      properties:
        profile: { $ref: '#/components/schemas/UserProfile' }
        evaluation: { $ref: '#/components/schemas/ContextBlockEvaluation' }

    ConfirmContextBlockRejection:
      type: object
      required: [error, evaluation]
      properties:
        error: { type: string }
        evaluation: { $ref: '#/components/schemas/ContextBlockEvaluation' }

    ProfileUpdate:
      type: object
      properties:
        branch: { type: [string, 'null'] }
        rank: { type: [string, 'null'] }
        mosCode: { type: [string, 'null'] }
        dutyTitle: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        baseLocation: { type: [string, 'null'] }
        securityClearance: { type: [string, 'null'] }
        deploymentStatus: { type: [string, 'null'] }
        primaryMission: { type: [string, 'null'] }
        aiUseCases:
          type: array
          items: { type: string }
        freeFormContext: { type: [string, 'null'] }

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id: { type: string }
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        createdAt: { type: string, format: date-time }

    ProfileChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string, minLength: 1 }

    ProfileChatResponse:
      type: object
      required: [reply, suggestedProfile]
      properties:
        reply: { type: string }
        suggestedProfile:
          oneOf:
            - $ref: '#/components/schemas/ProfileUpdate'
            - type: 'null'

    Category:
      type: object
      required: [id, slug, name, description, icon, sortOrder]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: [string, 'null'] }
        icon: { type: [string, 'null'] }
        sortOrder: { type: integer }

    ToolSummary:
      type: object
      required:
        [id, slug, name, vendor, shortDescription, atoStatus, impactLevels,
         dataClassification, badges, isFavorite, favoriteCount,
         launchCount, categorySlug, categoryName, isVendorSubmitted]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        vendor: { type: string }
        shortDescription: { type: string }
        atoStatus: { type: string }
        impactLevels:
          type: array
          items: { type: string }
        dataClassification: { type: string }
        badges:
          type: array
          items: { type: string }
        isFavorite: { type: boolean }
        favoriteCount: { type: integer }
        launchCount: { type: integer }
        categorySlug: { type: [string, 'null'] }
        categoryName: { type: [string, 'null'] }
        isVendorSubmitted: { type: boolean }

    ToolDetail:
      allOf:
        - $ref: '#/components/schemas/ToolSummary'
        - type: object
          required:
            [longDescription, purpose, ragQueryTemplates, version, homepageUrl,
             launchUrl, documentationUrl, logoUrl, isActive, categoryId,
             createdAt, updatedAt]
          properties:
            longDescription: { type: string }
            purpose:
              type: string
              description: >
                Admin-authored sentence describing what the tool actually does
                with the user's context. Fed to the RAG query generator so the
                primer queries match the tool's true intent (not just its
                marketing copy).
            ragQueryTemplates:
              type: array
              description: >
                Admin-authored seed query templates (e.g. "{primaryMission}",
                "{dutyTitle} SOPs"). Variables in {curlies} are interpolated
                from the launching user's profile; the resolved strings are
                merged with LLM-generated queries before searching the user's
                library.
              items: { type: string }
            version: { type: [string, 'null'] }
            homepageUrl: { type: [string, 'null'] }
            launchUrl: { type: string }
            documentationUrl: { type: [string, 'null'] }
            logoUrl: { type: [string, 'null'] }
            isActive: { type: boolean }
            categoryId: { type: [string, 'null'] }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }

    ToolUpsert:
      type: object
      required:
        [slug, name, vendor, shortDescription, longDescription, purpose,
         ragQueryTemplates, atoStatus, impactLevels, dataClassification, badges,
         launchUrl, isActive]
      properties:
        slug: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        vendor: { type: string, minLength: 1 }
        shortDescription: { type: string, minLength: 1 }
        longDescription: { type: string, minLength: 1 }
        purpose: { type: string }
        ragQueryTemplates:
          type: array
          items: { type: string }
        categoryId: { type: [string, 'null'] }
        atoStatus: { type: string }
        impactLevels:
          type: array
          items: { type: string }
        dataClassification: { type: string }
        version: { type: [string, 'null'] }
        badges:
          type: array
          items: { type: string }
        homepageUrl: { type: [string, 'null'] }
        launchUrl: { type: string, minLength: 1 }
        documentationUrl: { type: [string, 'null'] }
        logoUrl: { type: [string, 'null'] }
        isActive: { type: boolean }

    SubmissionUpsert:
      type: object
      required:
        [name, vendor, shortDescription, longDescription, atoStatus,
         impactLevels, dataClassification, launchUrl, contactEmail]
      properties:
        name: { type: string, minLength: 1 }
        vendor: { type: string, minLength: 1 }
        shortDescription: { type: string, minLength: 1 }
        longDescription: { type: string, minLength: 1 }
        categoryId: { type: [string, 'null'] }
        atoStatus: { type: string }
        impactLevels:
          type: array
          items: { type: string }
        dataClassification: { type: string }
        launchUrl: { type: string, minLength: 1 }
        homepageUrl: { type: [string, 'null'] }
        documentationUrl: { type: [string, 'null'] }
        logoUrl: { type: [string, 'null'] }
        contactEmail: { type: string, minLength: 1, format: email }

    SubmissionSummary:
      type: object
      required:
        [id, slug, name, vendor, shortDescription, atoStatus,
         submissionStatus, submittedAt, updatedAt, reviewComment,
         reviewedAt, isVendorSubmitted]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        vendor: { type: string }
        shortDescription: { type: string }
        atoStatus: { type: string }
        submissionStatus: { type: string }
        submittedAt: { type: [string, 'null'], format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewComment: { type: [string, 'null'] }
        reviewedAt: { type: [string, 'null'], format: date-time }
        isVendorSubmitted: { type: boolean }

    SubmissionDetail:
      allOf:
        - $ref: '#/components/schemas/SubmissionSummary'
        - type: object
          required:
            [longDescription, impactLevels, dataClassification,
             launchUrl, homepageUrl, documentationUrl, logoUrl,
             contactEmail, categoryId, categorySlug, categoryName,
             submitterId, submitterDisplayName]
          properties:
            longDescription: { type: string }
            impactLevels:
              type: array
              items: { type: string }
            dataClassification: { type: string }
            launchUrl: { type: string }
            homepageUrl: { type: [string, 'null'] }
            documentationUrl: { type: [string, 'null'] }
            logoUrl: { type: [string, 'null'] }
            contactEmail: { type: [string, 'null'] }
            categoryId: { type: [string, 'null'] }
            categorySlug: { type: [string, 'null'] }
            categoryName: { type: [string, 'null'] }
            submitterId: { type: [string, 'null'] }
            submitterDisplayName: { type: [string, 'null'] }

    SubmissionReviewRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, request_changes, reject]
        comment: { type: [string, 'null'] }

    LibraryStats:
      type: object
      required: [documentCount, chunkCount, totalChars]
      properties:
        documentCount: { type: integer }
        chunkCount: { type: integer }
        totalChars: { type: integer }

    DocumentSummary:
      type: object
      required:
        [id, title, sourceFilename, mimeType, sizeBytes, charCount,
         chunkCount, status, autoSource, sourceUrl, errorMessage,
         uploadedAt, processedAt, presetIds]
      properties:
        id: { type: string }
        title: { type: string }
        sourceFilename: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        charCount: { type: integer }
        chunkCount: { type: integer }
        status: { type: string }
        autoSource:
          type: [string, 'null']
          description: >
            Stable identifier of the auto-ingest source that produced this
            doc, e.g. "mos:army:11B" or "unit:marines:MALS-12". Null for
            documents the user uploaded by hand.
        sourceUrl:
          type: [string, 'null']
          description: Original public URL the doc was downloaded from (auto-ingest only).
        errorMessage: { type: [string, 'null'] }
        uploadedAt: { type: string, format: date-time }
        processedAt: { type: [string, 'null'], format: date-time }
        presetIds:
          type: array
          description: IDs of every mission preset this document is currently linked to.
          items: { type: string }

    DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/DocumentSummary'
        - type: object
          required: [chunks]
          properties:
            chunks:
              type: array
              items: { $ref: '#/components/schemas/ChunkPreview' }

    ChunkPreview:
      type: object
      required: [id, chunkIndex, content, charCount]
      properties:
        id: { type: string }
        chunkIndex: { type: integer }
        content: { type: string }
        charCount: { type: integer }

    TextDocumentUploadRequest:
      type: object
      required: [title, sourceFilename]
      properties:
        title: { type: string, minLength: 1 }
        sourceFilename: { type: string, minLength: 1 }
        mimeType: { type: string }
        content:
          type: string
          description: >
            UTF-8 plain-text body. Set this for paste-text uploads. Either
            content or contentBase64 must be provided.
        contentBase64:
          type: string
          description: >
            Base64-encoded binary body for PDF/DOCX/MD/TXT uploads. The server
            picks the right extractor based on mimeType. Either content or
            contentBase64 must be provided.

    LibraryTestQueryRequest:
      type: object
      required: [query]
      properties:
        query: { type: string, minLength: 1 }
        limit: { type: integer }

    LibraryTestQueryResponse:
      type: object
      required: [query, snippets]
      properties:
        query: { type: string }
        snippets:
          type: array
          items: { $ref: '#/components/schemas/RagSnippet' }

    LaunchInitiateResponse:
      type: object
      required: [launchId, launchToken, launchUrl, expiresAt]
      properties:
        launchId: { type: string }
        launchToken: { type: string }
        launchUrl: { type: string }
        expiresAt: { type: string, format: date-time }

    ContextExchangeRequest:
      type: object
      required: [launchToken]
      properties:
        launchToken: { type: string, minLength: 1 }

    ContextExchangeResponse:
      type: object
      required:
        [sessionToken, sessionExpiresAt, tool, user, profile, contextBlock,
         structuredContextBlock, primer]
      properties:
        sessionToken: { type: string }
        sessionExpiresAt: { type: string, format: date-time }
        tool:
          type: object
          required: [id, slug, name, vendor, atoStatus]
          properties:
            id: { type: string }
            slug: { type: string }
            name: { type: string }
            vendor: { type: string }
            atoStatus: { type: string }
        user:
          type: object
          required: [id, displayName, email]
          properties:
            id: { type: string }
            displayName: { type: string }
            email: { type: [string, 'null'] }
        profile: { $ref: '#/components/schemas/UserProfile' }
        contextBlock:
          type: string
          description: >
            Pre-formatted Markdown block summarizing the user's identity,
            mission, assignment, and (when confirmed) the 6-element
            Context Block. Tool builders can drop this directly into
            their model prompt without re-parsing the structured profile.
        structuredContextBlock:
          oneOf:
            - $ref: '#/components/schemas/ContextBlockState'
            - type: 'null'
          description: >
            Structured 6-element Context Block as last confirmed by the
            operator, or null when they have not yet confirmed one.
        primer: { $ref: '#/components/schemas/RagPrimer' }

    RagPrimer:
      type: object
      required: [queries, snippets]
      properties:
        queries:
          type: array
          items: { type: string }
        snippets:
          type: array
          items: { $ref: '#/components/schemas/RagSnippet' }

    RagSnippet:
      type: object
      required:
        [chunkId, documentId, documentTitle, chunkIndex, content, score]
      properties:
        chunkId: { type: string }
        documentId: { type: string }
        documentTitle: { type: string }
        chunkIndex: { type: integer }
        content: { type: string }
        score: { type: number }

    LibraryQueryRequest:
      type: object
      required: [sessionToken, query]
      properties:
        sessionToken: { type: string, minLength: 1 }
        query: { type: string, minLength: 1 }
        limit: { type: integer }

    LibraryQueryResponse:
      type: object
      required: [query, snippets]
      properties:
        query: { type: string }
        snippets:
          type: array
          items: { $ref: '#/components/schemas/RagSnippet' }

    AutoIngestRequest:
      type: object
      required: [source]
      properties:
        source:
          type: string
          description: 'Source identifier, e.g. "mos:army:11B" or "unit:marines:MALS-12".'

    AutoIngestSummary:
      type: object
      required: [source, total, added, existing, failed]
      properties:
        source: { type: string }
        total: { type: integer, description: Number of curated docs in the package. }
        added: { type: integer, description: Newly downloaded and ingested. }
        existing: { type: integer, description: Already present, skipped. }
        failed: { type: integer }

    AutoIngestJob:
      type: object
      required:
        [id, source, status, totalCount, addedCount, existingCount,
         failedCount, errorMessage, createdAt, updatedAt]
      properties:
        id: { type: string }
        source: { type: string }
        status: { type: string, description: '"running" | "done" | "failed"' }
        totalCount: { type: integer }
        addedCount: { type: integer }
        existingCount: { type: integer }
        failedCount: { type: integer }
        errorMessage: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AutoIngestStatusResponse:
      type: object
      required: [source, job]
      properties:
        source: { type: string }
        job:
          oneOf:
            - $ref: '#/components/schemas/AutoIngestJob'
            - type: 'null'

    LaunchHistoryItem:
      type: object
      required: [id, toolId, toolName, toolSlug, status, createdAt]
      properties:
        id: { type: string }
        toolId: { type: string }
        toolName: { type: string }
        toolSlug: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    DashboardSummary:
      type: object
      required:
        [profileCompletenessPct, libraryDocumentCount, libraryChunkCount,
         favoritesCount, launchCount, recentLaunches, atoStatusBreakdown,
         topTools]
      properties:
        profileCompletenessPct: { type: integer }
        libraryDocumentCount: { type: integer }
        libraryChunkCount: { type: integer }
        favoritesCount: { type: integer }
        launchCount: { type: integer }
        recentLaunches:
          type: array
          items: { $ref: '#/components/schemas/LaunchHistoryItem' }
        atoStatusBreakdown:
          type: array
          items:
            type: object
            required: [atoStatus, count]
            properties:
              atoStatus: { type: string }
              count: { type: integer }
        topTools:
          type: array
          items: { $ref: '#/components/schemas/ToolSummary' }

    PresetProfileSnapshot:
      type: object
      required:
        [branch, rank, mosCode, dutyTitle, unit, baseLocation,
         securityClearance, deploymentStatus, primaryMission,
         aiUseCases, freeFormContext]
      properties:
        branch: { type: [string, 'null'] }
        rank: { type: [string, 'null'] }
        mosCode: { type: [string, 'null'] }
        dutyTitle: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        baseLocation: { type: [string, 'null'] }
        securityClearance: { type: [string, 'null'] }
        deploymentStatus: { type: [string, 'null'] }
        primaryMission: { type: [string, 'null'] }
        aiUseCases:
          type: array
          items: { type: string }
        freeFormContext: { type: [string, 'null'] }

    MissionPreset:
      type: object
      required:
        [id, name, description, profileSnapshot, documentIds, isActive,
         createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: [string, 'null'] }
        profileSnapshot: { $ref: '#/components/schemas/PresetProfileSnapshot' }
        documentIds:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MissionPresetCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        profileSnapshot:
          oneOf:
            - $ref: '#/components/schemas/PresetProfileSnapshot'
            - type: 'null'
        documentIds:
          type: array
          items: { type: string }
        activate: { type: boolean }

    MissionPresetUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        profileSnapshot:
          oneOf:
            - $ref: '#/components/schemas/PresetProfileSnapshot'
            - type: 'null'
        documentIds:
          type: array
          items: { type: string }

    PresetDeleteResponse:
      type: object
      required: [success, activePresetId]
      properties:
        success: { type: boolean }
        activePresetId: { type: string }

    DocumentPresetTagsUpdate:
      type: object
      required: [presetIds]
      properties:
        presetIds:
          type: array
          items: { type: string }
