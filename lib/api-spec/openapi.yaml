  /admin/tools/draft-text:
    post:
      tags: [Admin]
      operationId: draftToolText
      summary: Generate a first-draft tool description with the LLM
      description: |
        Returns a draft only — the admin must still click Save on the regular
        create/update endpoints to persist anything.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DraftToolTextRequest' }
      responses:
        '200':
          description: Draft generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DraftToolTextResult' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/tools/installer-upload-url:
    post:
      tags: [Admin]
      operationId: requestInstallerUploadUrl
      summary: Mint a presigned upload URL for a tool installer file
      description: |
        Legacy single-PUT presigned URL flow. New clients should prefer the
        resumable flow (initInstallerUpload + chunked PUTs) so that an
        interrupted upload can resume rather than restarting from byte 0.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InstallerUploadUrlRequest' }
      responses:
        '200':
          description: Upload URL minted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstallerUploadUrlResponse' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/tools/installer-upload-init:
    post:
      tags: [Admin]
      operationId: initInstallerUpload
      summary: Start or resume a chunked installer upload session
      description: |
        Returns an upload session that the client can stream chunks into via
        PUT /admin/tools/installer-upload/{uploadId}/chunk. If a pending
        session already exists for the same user + fileFingerprint, that
        session is returned (with its current `bytesUploaded`) so the client
        can resume rather than restart.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InitInstallerUploadRequest' }
      responses:
        '200':
          description: Upload session ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstallerUploadSession' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '413':
          description: File exceeds the maximum installer size
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/tools/installer-upload/{uploadId}/complete:
    post:
      tags: [Admin]
      operationId: completeInstallerUpload
      summary: Finalize a resumable installer upload
      parameters:
        - in: path
          name: uploadId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Upload finalized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstallerUploadResult' }
        '404':
          description: Upload session not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Upload not yet fully received
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/tools/installer-upload/{uploadId}/abort:
    post:
      tags: [Admin]
      operationId: abortInstallerUpload
      summary: Discard an in-progress installer upload session
      parameters:
        - in: path
          name: uploadId
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Aborted
        '404':
          description: Upload session not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

