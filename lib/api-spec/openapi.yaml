openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: DoW AI Tool Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Profile
    description: Service member profile and AI-assisted profile builder.
  - name: Catalog
    description: Public-facing tool catalog and favorites.
  - name: Library
    description: Personal RAG library — doctrine, SOPs, FMs.
  - name: Launch
    description: Tool launch + token-based context exchange.
  - name: Admin
    description: Admin tool and category CRUD.
  - name: Submissions
    description: Vendor tool submissions and admin review queue.
  - name: Dashboard
    description: Aggregated dashboard summaries.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Reviews
    description: Tool ratings and reviews.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ---------- Auth ----------
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthUserEnvelope' }
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema: { type: string }
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string }
        - name: state
          in: query
          required: false
          schema: { type: string }
        - name: iss
          in: query
          required: false
          schema: { type: string, format: uri }
      responses:
        '302':
          description: Redirect to the returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MobileTokenExchangeRequest' }
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MobileTokenExchangeSuccess' }
        '400':
          description: Bad request.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LogoutSuccess' }

  # ---------- Profile ----------
  /profile:
    get:
      tags: [Profile]
      operationId: getMyProfile
      summary: Get the current user's profile and context block
      responses:
        '200':
          description: Profile envelope
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    put:
      tags: [Profile]
      operationId: updateMyProfile
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileUpdate' }
      responses:
        '200':
          description: Updated profile envelope
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/chat:
    get:
      tags: [Profile]
      operationId: getProfileChatHistory
      summary: Get profile-builder chat history
      responses:
        '200':
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChatMessage' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    post:
      tags: [Profile]
      operationId: sendProfileChat
      summary: Send a message to the profile-builder assistant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileChatRequest' }
      responses:
        '200':
          description: Assistant reply (with optional structured profile suggestion)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileChatResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/chat/reset:
    post:
      tags: [Profile]
      operationId: resetProfileChat
      summary: Clear profile-builder chat history
      responses:
        '200':
          description: Reset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/context-block/evaluate:
    post:
      tags: [Profile]
      operationId: evaluateContextBlock
      summary: Score a candidate 6-element Context Block without persisting it
      description: >
        Runs the Semantic NLP Evaluator against the supplied 6 elements
        and returns the per-criterion scores, total /12, GO/NO-GO status,
        and any OPSEC flag. Does not modify the operator's stored block.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContextBlockFields' }
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextBlockEvaluation' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          description: Evaluator unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/context-block/confirm:
    post:
      tags: [Profile]
      operationId: confirmContextBlock
      summary: Save a 6-element Context Block (server re-evaluates and rejects NO-GO)
      description: >
        Re-runs the Semantic NLP Evaluator server-side, rejects NO-GO and
        OPSEC-flagged submissions, and persists the 6 fields plus the
        latest score and confirmed-at timestamp on the operator's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContextBlockFields' }
      responses:
        '200':
          description: Confirmed Context Block state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextBlockConfirmation' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          description: NO-GO — context block did not meet the 10/12 threshold or tripped OPSEC
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmContextBlockRejection' }
        '500':
          description: Evaluator unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Presets ----------
  /profile/presets:
    get:
      tags: [Profile]
      operationId: listMyPresets
      summary: List the current user's mission presets
      responses:
        '200':
          description: Presets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MissionPreset' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    post:
      tags: [Profile]
      operationId: createMyPreset
      summary: Create a new mission preset (snapshots the current profile by default)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MissionPresetCreate' }
      responses:
        '200':
          description: Created preset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MissionPreset' }
        '400':
          description: Invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/presets/{id}:
    put:
      tags: [Profile]
      operationId: updateMyPreset
      summary: Update a preset's name, description, snapshot, or document scope
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MissionPresetUpdate' }
      responses:
        '200':
          description: Updated preset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MissionPreset' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Profile]
      operationId: deleteMyPreset
      summary: Delete a preset (the user must always have at least one)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted, with the new active preset id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresetDeleteResponse' }
        '400':
          description: Cannot delete the only remaining preset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/presets/{id}/duplicate:
    post:
      tags: [Profile]
      operationId: duplicateMyPreset
      summary: Duplicate an existing preset (snapshot + document scope)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Duplicated preset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MissionPreset' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /profile/presets/{id}/activate:
    post:
      tags: [Profile]
      operationId: activateMyPreset
      summary: Set a preset as the user's active preset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Activated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MissionPreset' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Catalog ----------
  /catalog/categories:
    get:
      tags: [Catalog]
      operationId: listCategories
      summary: List all tool categories
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }
  /catalog/tools:
    get:
      tags: [Catalog]
      operationId: listTools
      summary: List/search catalog tools
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: category
          in: query
          required: false
          schema: { type: string }
        - name: ato_status
          in: query
          required: false
          schema: { type: string }
        - name: impact_level
          in: query
          required: false
          schema: { type: string }
        - name: favorites_only
          in: query
          required: false
          schema: { type: boolean }
        - name: sort
          in: query
          required: false
          description: 'Sort order: "name" (default) or "rating".'
          schema: { type: string, enum: [name, rating] }
      responses:
        '200':
          description: Tools
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ToolSummary' }
  /catalog/tools/{slug}:
    get:
      tags: [Catalog]
      operationId: getToolBySlug
      summary: Get a tool by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tool
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ToolDetail' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /catalog/favorites/{toolId}:
    post:
      tags: [Catalog]
      operationId: addFavorite
      summary: Favorite a tool
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Favorited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Catalog]
      operationId: removeFavorite
      summary: Unfavorite a tool
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Unfavorited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Reviews ----------
  /catalog/reviews:
    get:
      tags: [Reviews]
      operationId: listToolReviews
      summary: List reviews for a tool (paginated)
      parameters:
        - name: tool_slug
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Reviews
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ToolReviewListResponse' }
        '404':
          description: Tool not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /catalog/tools/{toolId}/review:
    put:
      tags: [Reviews]
      operationId: upsertMyToolReview
      summary: Create or update the current user's review for a tool
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ToolReviewUpsert' }
      responses:
        '200':
          description: Saved review
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ToolReview' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403':
          description: Must launch the tool before reviewing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Tool not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Reviews]
      operationId: deleteMyToolReview
      summary: Delete the current user's review for a tool
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Review not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /admin/reviews:
    get:
      tags: [Reviews]
      operationId: adminListReviews
      summary: Admin list of all reviews (including hidden)
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema: { type: boolean }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Reviews
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminReviewListResponse' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/reviews/{reviewId}/hide:
    post:
      tags: [Reviews]
      operationId: adminHideReview
      summary: Soft-hide a review with a reason
      parameters:
        - name: reviewId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminHideReviewRequest' }
      responses:
        '200':
          description: Hidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminToolReview' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Review not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /admin/reviews/{reviewId}/unhide:
    post:
      tags: [Reviews]
      operationId: adminUnhideReview
      summary: Restore a hidden review
      parameters:
        - name: reviewId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Unhidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminToolReview' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Review not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Library ----------
  /library/stats:
    get:
      tags: [Library]
      operationId: getLibraryStats
      summary: Stats for the user's RAG library
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryStats' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/documents:
    get:
      tags: [Library]
      operationId: listDocuments
      summary: List the user's documents
      parameters:
        - name: presetId
          in: query
          required: false
          description: >
            When set, only return documents currently linked to that mission preset.
          schema: { type: string }
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DocumentSummary' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    post:
      tags: [Library]
      operationId: uploadTextDocument
      summary: Upload a document by sending its raw text (for plain-text uploads)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TextDocumentUploadRequest' }
      responses:
        '200':
          description: Created document
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentSummary' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/auto-ingest:
    post:
      tags: [Library]
      operationId: triggerAutoIngest
      summary: Trigger auto-ingest of a curated MOS or Unit doctrine package
      description: >
        Looks up the curated doctrine package for the given source
        ("mos:<branch>:<code>" or "unit:<branch>:<id>"), downloads each
        public-doctrine URL server-side, extracts and chunks it, and
        inserts the new docs into the user's library. Existing docs with
        the same source URL are skipped, so re-running this is safe and
        idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AutoIngestRequest' }
      responses:
        '200':
          description: Ingest finished synchronously
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoIngestSummary' }
        '400':
          description: Bad request (no curated package for source)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/auto-ingest/status:
    get:
      tags: [Library]
      operationId: getAutoIngestStatus
      summary: Poll the most recent auto-ingest job for a source
      parameters:
        - name: source
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Status (or null when no job exists)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoIngestStatusResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/test-query:
    post:
      tags: [Library]
      operationId: testLibraryQuery
      summary: Run a sample RAG query against the user's own library (dry-run)
      description: >
        Lets the signed-in user verify their library is returning useful
        snippets BEFORE trusting it with a tool launch. Identical retrieval
        path to the launch-token-scoped /tools/library-query endpoint, but
        scoped to the current authenticated user instead of a session token.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryTestQueryRequest' }
      responses:
        '200':
          description: Snippets
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryTestQueryResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /library/documents/{id}:
    get:
      tags: [Library]
      operationId: getDocument
      summary: Get document metadata + first chunks
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Document detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentDetail' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Library]
      operationId: deleteDocument
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleSuccess' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /library/documents/{id}/snippet:
    get:
      tags: [Library]
      operationId: getDocumentSnippet
      summary: Get a bounded representative text excerpt for a single document
      description: >
        Used by the Doctrine & Orders picker on the Catalog page (Task #85).
        Returns the first one or two chunks of the document concatenated and
        capped at a server-side character budget so a single ticked doc
        cannot dominate the Context Block textbox. The actual doctrine text
        is returned (not just a citation) so the operator can see what their
        Context Block will ship to the tool.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Snippet payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentSnippet' }
        '400':
          description: Document is not ready or has no chunks
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /library/documents/{id}/retry:
    post:
      tags: [Library]
      operationId: retryFailedDocument
      summary: Retry processing for a single failed document
      description: >
        Re-runs the extraction pipeline against an existing failed document
        without forcing the user to re-upload or re-discover the source.
        Two flavours, dispatched on the document's metadata:

        1. Auto-ingested docs (`autoSource` + `sourceUrl` set, no
        `storageObjectPath`): re-runs the same fetch + extract + chunk
        path that auto-ingest uses, updating the row in place.

        2. User-uploaded docs (`storageObjectPath` set, no `autoSource`):
        re-runs the async extraction pipeline against the already-uploaded
        blob in object storage, dropping any leftover chunks and
        replacing them.

        On success the row flips to `ready` with chunks; on failure it
        stays `failed` with a refreshed `errorMessage`. Either way the
        document's `retryCount` is incremented. For user-uploaded docs the
        endpoint refuses further retries after a small cap and returns
        `400` so the UI can prompt for a fresh upload.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated document
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentSummary' }
        '400':
          description: Document is not eligible for retry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /library/documents/{id}/presets:
    put:
      tags: [Library]
      operationId: setDocumentPresetTags
      summary: Replace the set of presets a document belongs to
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DocumentPresetTagsUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentSummary' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Launch ----------
  /tools/{toolId}/launch-preview:
    post:
      tags: [Launch]
      operationId: previewLaunchContext
      summary: Compute the candidate launch payload (profile fields + RAG snippets) without minting a token
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LaunchPreviewRequest' }
      responses:
        '200':
          description: Candidate context bundle the user can review and edit before launch
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LaunchPreviewResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /tools/{toolId}/launch:
    post:
      tags: [Launch]
      operationId: launchTool
      summary: Initiate a tool launch (issues a single-use launch token, with optional redaction)
      description: >
        Server-side gate (Task #45): refuses to mint a token unless a valid,
        unexpired launch affirmation exists for (user, active preset,
        current context-block version). Returns 409 with structured
        `needs_affirmation` payload when the gate isn't satisfied so the
        client can render the affirmation modal.
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LaunchToolRequest' }
      responses:
        '200':
          description: Launch initiated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LaunchInitiateResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: >
            Launch-time affirmation gate not satisfied. The client should
            render the affirmation modal using the returned preset and
            context block, then POST /launches/affirm and retry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LaunchNeedsAffirmation' }
  /launches/affirmation:
    get:
      tags: [Launch]
      operationId: getLaunchAffirmation
      summary: Read the current launch-time affirmation for the active preset
      description: >
        Returns the current valid affirmation if one exists for the active
        preset + current context-block version, otherwise returns null.
        Used by the marketplace to decide whether to show the
        "preset confirmed for this session" indicator vs. open the modal.
      responses:
        '200':
          description: Current affirmation status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LaunchAffirmationStatus' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /launches/affirm:
    post:
      tags: [Launch]
      operationId: createLaunchAffirmation
      summary: Affirm that the active preset's context block is still current
      description: >
        Creates / replaces the user's launch-time affirmation, valid for
        ~30 minutes. The body's presetId and contextBlockVersion must match
        the user's active preset and the current context-block version
        respectively, otherwise 409 is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLaunchAffirmationRequest' }
      responses:
        '200':
          description: Affirmation created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LaunchAffirmation' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Stale affirmation request (preset or context-block version mismatch)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LaunchNeedsAffirmation' }
  /tools/context-exchange:
    post:
      tags: [Launch]
      operationId: exchangeContextToken
      summary: Tool exchanges a launch token for the user's context bundle and a session token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContextExchangeRequest' }
      responses:
        '200':
          description: Context bundle
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextExchangeResponse' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /tools/library-query:
    post:
      tags: [Launch]
      operationId: queryLibrary
      summary: Tool queries the user's library with a session token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryQueryRequest' }
      responses:
        '200':
          description: Snippets
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryQueryResponse' }
        '401':
          description: Invalid session token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /tools/draft-brief:
    post:
      tags: [Launch]
      operationId: draftBrief
      summary: Tool asks Claude to draft a mission brief from the launched context
      description: >
        Session-token-scoped endpoint used by the Mission Brief Drafter demo
        tool. Re-loads the launching user's profile and primer snippets,
        optionally pulls additional library snippets for the user's topic,
        and asks Claude to produce a draft brief in the user's voice.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BriefDraftRequest' }
      responses:
        '200':
          description: Draft brief
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BriefDraft' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Invalid session token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /launches/recent:
    get:
      tags: [Launch]
      operationId: listRecentLaunches
      summary: List the user's recent tool launches
      responses:
        '200':
          description: Launches
          content:
            application/json:
