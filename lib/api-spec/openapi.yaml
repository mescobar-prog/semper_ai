          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Storage ----------
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadUrlResponse' }
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '413':
          description: File too large.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '415':
          description: Unsupported file type.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ---------- Dashboard ----------
  /dashboard/summary:
    get:
      tags: [Dashboard]
      operationId: getDashboardSummary
      summary: Aggregated dashboard summary
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardSummary' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema: { type: string }
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema: { type: string }
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    SimpleSuccess:
      type: object
      required: [success]
      properties:
        success: { type: boolean }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { type: string }

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id: { type: string }
        email: { type: [string, 'null'], format: email }
        firstName: { type: [string, 'null'] }
        lastName: { type: [string, 'null'] }
        profileImageUrl: { type: [string, 'null'] }

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code: { type: string, minLength: 1 }
        code_verifier: { type: string, minLength: 1 }
        redirect_uri: { type: string, minLength: 1, format: uri }
        state: { type: string, minLength: 1 }
        nonce: { type: string, minLength: 1 }

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token: { type: string }

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success: { type: boolean, const: true }

    UserProfile:
      type: object
      description: >
        Persistent identity / assignment data for the operator. The
        task-dependent 6-element Context Block is returned as a sibling
        `contextBlock` field, never embedded here.
      required:
        [userId, branch, rank, mosCode, dutyTitle, unit, baseLocation,
         securityClearance, deploymentStatus, command, billets,
         freeFormContext, isAdmin, viewMode, launchPreference,
         completenessPct, activePresetId, updatedAt]
      properties:
        userId: { type: string }
        branch: { type: [string, 'null'] }
        rank: { type: [string, 'null'] }
        mosCode: { type: [string, 'null'] }
        dutyTitle: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        baseLocation: { type: [string, 'null'] }
        securityClearance: { type: [string, 'null'] }
        deploymentStatus: { type: [string, 'null'] }
        command:
          type: [string, 'null']
          description: >
            Combatant command code (e.g. USINDOPACOM, USCYBERCOM, OTHER).
        billets:
          type: array
          description: Billet titles the operator currently holds.
          items: { type: string }
        freeFormContext: { type: [string, 'null'] }
        isAdmin: { type: boolean }
        viewMode:
          type: string
          enum: [admin, operator]
          description: >
            Per-admin presentation toggle controlling whether admin-only
            UI affordances render. Always "admin" for non-admin users
            and ignored by server-side authorization, which keys off
            isAdmin only.
        launchPreference: { type: string, enum: [preview, direct] }
        completenessPct: { type: integer }
        activePresetId: { type: [string, 'null'] }
        updatedAt: { type: string, format: date-time }

    ProfileEnvelope:
      type: object
      description: >
        Envelope returned by GET /profile and PUT /profile. The persistent
        identity profile and the task-dependent Context Block are kept in
        separate top-level fields so callers can refresh either one
        without touching the other.
      required: [profile, contextBlock]
      properties:
        profile: { $ref: '#/components/schemas/UserProfile' }
        contextBlock: { $ref: '#/components/schemas/ContextBlockState' }

    ContextBlockFields:
      type: object
      required: [doctrine, intent, environment, constraints, risk, experience]
      properties:
        doctrine:
          type: string
          description: Element 1 — Doctrine & Orders cited (e.g. MCDP-4, unit SOPs).
        intent:
          type: string
          description: Element 2 — Commander's intent for this task.
        environment:
          type: string
          description: Element 3 — Operational environment.
        constraints:
          type: string
          description: Element 4 — Constraints & limitations.
        risk:
          type: string
          description: Element 5 — Risk if the LLM hallucinates.
        experience:
          type: string
          description: Element 6 — Human experience & judgment AI cannot infer.

    ContextBlockScores:
      type: object
      required: [doctrine, environment, constraints, experience]
      properties:
        doctrine: { type: integer, description: Criterion 1 score (1-3). }
        environment:
          type: integer
          description: Criterion 2 — environment & commander's intent (1-3).
        constraints:
          type: integer
          description: Criterion 3 — constraints, limitations & risk (1-3).
        experience: { type: integer, description: Criterion 4 score (1-3). }

    ContextBlockEvaluation:
      type: object
      required: [submissionId, scores, totalScore, status, opsecFlag, flags]
      properties:
        submissionId: { type: string }
        scores: { $ref: '#/components/schemas/ContextBlockScores' }
        totalScore:
          type: integer
          description: Sum of the four criteria, /12. Forced to 0 on OPSEC violations.
        status:
          type: string
          description: '"GO" when totalScore >= 10 and OPSEC clean, else "NO-GO".'
        opsecFlag:
          type: boolean
          description: True if the submission tripped the OPSEC fail-safe.
        flags:
          type: string
          description: Brief description of OPSEC violation or ambiguity, "None" otherwise.

    ContextBlockState:
      type: object
      required:
        [doctrine, intent, environment, constraints, risk, experience,
         confirmedAt, lastEvaluation, version]
      properties:
        doctrine: { type: [string, 'null'] }
        intent: { type: [string, 'null'] }
        environment: { type: [string, 'null'] }
        constraints: { type: [string, 'null'] }
        risk: { type: [string, 'null'] }
        experience: { type: [string, 'null'] }
        confirmedAt:
          type: [string, 'null']
          format: date-time
          description: When the operator last accepted this Context Block.
        lastEvaluation:
          oneOf:
            - $ref: '#/components/schemas/ContextBlockEvaluation'
            - type: 'null'
        version:
          type: integer
          description: >
            Monotonic version of this context block. Bumps every time any of
            the 6 fields are edited or the block is re-confirmed. The
            launch-time affirmation gate (Task #45) pairs (user, active
            preset, this version) so any edit/re-confirm auto-invalidates
            an outstanding affirmation.

    ContextBlockConfirmation:
      type: object
      required: [profile, contextBlock, evaluation]
      properties:
        profile: { $ref: '#/components/schemas/UserProfile' }
        contextBlock: { $ref: '#/components/schemas/ContextBlockState' }
        evaluation: { $ref: '#/components/schemas/ContextBlockEvaluation' }

    ConfirmContextBlockRejection:
      type: object
      required: [error, evaluation]
      properties:
        error: { type: string }
        evaluation: { $ref: '#/components/schemas/ContextBlockEvaluation' }

    ProfileUpdate:
      type: object
      description: >
        Partial update for the persistent identity profile. Only the
        supplied fields are written. The 6-element Context Block is NOT
        updated through this endpoint — use /profile/context-block/confirm
        instead.
      properties:
        branch: { type: [string, 'null'] }
        rank: { type: [string, 'null'] }
        mosCode: { type: [string, 'null'] }
        dutyTitle: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        baseLocation: { type: [string, 'null'] }
        securityClearance: { type: [string, 'null'] }
        deploymentStatus: { type: [string, 'null'] }
        command:
          type: [string, 'null']
          description: >
            Combatant command code. Server-side validated against the
            COMBATANT_COMMANDS list; invalid codes are coerced to null.
        billets:
          type: array
          description: Billet titles the operator currently holds.
          items: { type: string }
        freeFormContext: { type: [string, 'null'] }
        launchPreference: { type: string, enum: [preview, direct] }
        viewMode:
          type: string
          enum: [admin, operator]
          description: >
            Persist the admin's chosen presentation mode. Server silently
            ignores this field for non-admins.

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id: { type: string }
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        createdAt: { type: string, format: date-time }

    ProfileChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string, minLength: 1 }

    ProfileChatResponse:
      type: object
      required: [reply, suggestedProfile]
      properties:
        reply: { type: string }
        suggestedProfile:
          oneOf:
            - $ref: '#/components/schemas/ProfileUpdate'
            - type: 'null'

    Category:
      type: object
      required: [id, slug, name, description, icon, sortOrder]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: [string, 'null'] }
        icon: { type: [string, 'null'] }
        sortOrder: { type: integer }

    ToolSummary:
      type: object
      required:
        [id, slug, name, vendor, shortDescription, atoStatus, impactLevels,
         dataClassification, badges, isFavorite, favoriteCount,
         launchCount, categorySlug, categoryName, isVendorSubmitted,
         avgRating, reviewCount, hostingType]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        vendor: { type: string }
        shortDescription: { type: string }
        atoStatus: { type: string }
        impactLevels:
          type: array
          items: { type: string }
        dataClassification: { type: string }
        badges:
          type: array
          items: { type: string }
        isFavorite: { type: boolean }
        favoriteCount: { type: integer }
        launchCount: { type: integer }
        categorySlug: { type: [string, 'null'] }
        categoryName: { type: [string, 'null'] }
        isVendorSubmitted: { type: boolean }
        avgRating:
          type: [number, 'null']
          description: Average star rating across visible reviews, or null when there are no reviews.
        reviewCount:
          type: integer
          description: Number of visible reviews.
        hostingType:
          type: string
          enum: [cloud, local_install]

    ToolDetail:
      allOf:
        - $ref: '#/components/schemas/ToolSummary'
        - type: object
          required:
            [longDescription, purpose, ragQueryTemplates, version, homepageUrl,
             launchUrl, documentationUrl, logoUrl, isActive, categoryId,
             hostingType, installerUrl, installerObjectKey, installerFilename,
             installerSizeBytes, installerPlatform, installInstructions,
             localLaunchUrlPattern, installerDownloadUrl,
             gitRepoOwner, gitRepoName, gitDefaultBranch, gitLatestReleaseTag,
             gitLatestCommitSha, gitLicenseSpdx, gitStars, gitLastSyncedAt,
             createdAt, updatedAt]
          properties:
            longDescription: { type: string }
            purpose:
              type: string
              description: >
                Admin-authored sentence describing what the tool actually does
                with the user's context. Fed to the RAG query generator so the
                primer queries match the tool's true intent (not just its
                marketing copy).
            ragQueryTemplates:
              type: array
              description: >
                Admin-authored seed query templates (e.g. "{dutyTitle} SOPs",
                "{billets} OPORD"). Variables in {curlies} are interpolated
                from the launching user's profile; the resolved strings are
                merged with LLM-generated queries before searching the user's
                library.
              items: { type: string }
            version: { type: [string, 'null'] }
            homepageUrl: { type: [string, 'null'] }
            launchUrl: { type: string }
            documentationUrl: { type: [string, 'null'] }
            logoUrl: { type: [string, 'null'] }
            isActive: { type: boolean }
            categoryId: { type: [string, 'null'] }
            hostingType:
              type: string
              enum: [cloud, local_install]
              description: How end users actually run this tool.
            installerUrl: { type: [string, 'null'] }
            installerObjectKey: { type: [string, 'null'] }
            installerFilename: { type: [string, 'null'] }
            installerSizeBytes: { type: [integer, 'null'] }
            installerPlatform: { type: [string, 'null'] }
            installInstructions: { type: [string, 'null'] }
            localLaunchUrlPattern: { type: [string, 'null'] }
            installerDownloadUrl:
              type: [string, 'null']
              description: >
                Stable download URL the end user can hit to fetch the installer.
                Set when an installer file is attached via object storage.
            gitRepoOwner: { type: [string, 'null'] }
            gitRepoName: { type: [string, 'null'] }
            gitDefaultBranch: { type: [string, 'null'] }
            gitLatestReleaseTag: { type: [string, 'null'] }
            gitLatestCommitSha: { type: [string, 'null'] }
            gitLicenseSpdx: { type: [string, 'null'] }
            gitStars: { type: [integer, 'null'] }
            gitLastSyncedAt: { type: [string, 'null'], format: date-time }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }

    ToolUpsert:
      type: object
      required:
        [slug, name, vendor, shortDescription, longDescription, purpose,
         ragQueryTemplates, atoStatus, impactLevels, dataClassification, badges,
         launchUrl, isActive, hostingType]
      properties:
        slug: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        vendor: { type: string, minLength: 1 }
        shortDescription: { type: string, minLength: 1 }
        longDescription: { type: string, minLength: 1 }
        purpose: { type: string }
        ragQueryTemplates:
          type: array
          items: { type: string }
        categoryId: { type: [string, 'null'] }
        atoStatus: { type: string }
        impactLevels:
          type: array
          items: { type: string }
        dataClassification: { type: string }
        version: { type: [string, 'null'] }
        badges:
          type: array
          items: { type: string }
        homepageUrl: { type: [string, 'null'] }
        launchUrl: { type: string, minLength: 1 }
        documentationUrl: { type: [string, 'null'] }
        logoUrl: { type: [string, 'null'] }
        isActive: { type: boolean }
        hostingType:
          type: string
          enum: [cloud, local_install]
        installerUrl: { type: [string, 'null'] }
        installerObjectKey: { type: [string, 'null'] }
        installerFilename: { type: [string, 'null'] }
        installerSizeBytes: { type: [integer, 'null'] }
        installerPlatform: { type: [string, 'null'] }
        installInstructions: { type: [string, 'null'] }
        localLaunchUrlPattern: { type: [string, 'null'] }
        gitRepoOwner: { type: [string, 'null'] }
        gitRepoName: { type: [string, 'null'] }
        gitDefaultBranch: { type: [string, 'null'] }
        gitLatestReleaseTag: { type: [string, 'null'] }
        gitLatestCommitSha: { type: [string, 'null'] }
        gitLicenseSpdx: { type: [string, 'null'] }
        gitStars: { type: [integer, 'null'] }

    GithubRepoSummary:
      type: object
      required: [owner, name, fullName, description, defaultBranch, private, stars, language]
      properties:
        owner: { type: string }
        name: { type: string }
        fullName: { type: string }
        description: { type: [string, 'null'] }
        defaultBranch: { type: string }
        private: { type: boolean }
        stars: { type: integer }
        language: { type: [string, 'null'] }

    GithubRepoMetadata:
      type: object
      required:
        [owner, name, fullName, description, defaultBranch, private, stars,
         language, licenseSpdx, latestReleaseTag, latestCommitSha, homepageUrl,
         readmeMarkdown]
      properties:
        owner: { type: string }
        name: { type: string }
        fullName: { type: string }
        description: { type: [string, 'null'] }
        defaultBranch: { type: string }
        private: { type: boolean }
        stars: { type: integer }
        language: { type: [string, 'null'] }
        licenseSpdx: { type: [string, 'null'] }
        latestReleaseTag: { type: [string, 'null'] }
        latestCommitSha: { type: [string, 'null'] }
        homepageUrl: { type: [string, 'null'] }
        readmeMarkdown: { type: [string, 'null'] }

    DraftToolTextRequest:
      type: object
      required: [field, sourceMaterial]
      properties:
        field:
          type: string
          enum: [shortDescription, longDescription, purpose, ragQueryTemplates]
        sourceMaterial:
          type: object
          properties:
            name: { type: string }
            vendor: { type: string }
            homepageUrl: { type: string }
            githubReadme: { type: string }
            existingText: { type: string }
        steering:
          type: string
          description: |
            Optional short note from the admin to steer a regenerate
            (e.g. "shorter", "more technical", "lead with the workflow").

    DraftToolTextResult:
      type: object
      required: [field, text, list]
      properties:
        field:
          type: string
          enum: [shortDescription, longDescription, purpose, ragQueryTemplates]
        text: { type: [string, 'null'] }
        list:
          type: [array, 'null']
          items: { type: string }

    InstallerUploadUrlRequest:
      type: object
      required: [filename, sizeBytes, contentType]
      properties:
        filename: { type: string, minLength: 1 }
        sizeBytes: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }

    InstallerUploadUrlResponse:
      type: object
      required: [uploadUrl, objectKey, downloadUrl]
      properties:
        uploadUrl: { type: string }
        objectKey:
          type: string
          description: Persist this on the tool record as installerObjectKey.
        downloadUrl:
          type: string
          description: Stable URL the marketplace can serve to end users.

    InitInstallerUploadRequest:
      type: object
      required: [filename, sizeBytes, contentType, fileFingerprint]
      properties:
        filename: { type: string, minLength: 1 }
        sizeBytes: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }
        fileFingerprint:
          type: string
          minLength: 1
          description: |
            Stable identifier for the file picked locally — typically
            `${name}|${size}|${lastModified}`. Lets the server look up an
            existing in-progress upload and return its current
            `bytesUploaded` so the client can resume.

    InstallerUploadSession:
      type: object
      required:
        [uploadId, objectKey, downloadUrl, sizeBytes, bytesUploaded,
         chunkSize, resumed]
      properties:
        uploadId: { type: string }
        objectKey:
          type: string
          description: Persist this on the tool record as installerObjectKey.
        downloadUrl:
          type: string
          description: Stable URL the marketplace can serve to end users.
        sizeBytes: { type: integer }
        bytesUploaded:
          type: integer
          description: How many bytes are already on GCS for this session.
        chunkSize:
          type: integer
          description: |
            The chunk size, in bytes, the client should use for each PUT to
            the chunk endpoint. Must be a multiple of 256 KB except for the
            final chunk.
        resumed:
          type: boolean
          description: True when an existing pending session was returned.

    InstallerUploadResult:
      type: object
      required: [objectKey, downloadUrl, sizeBytes, filename]
      properties:
        objectKey:
          type: string
          description: Persist this on the tool record as installerObjectKey.
        downloadUrl: { type: string }
        sizeBytes: { type: integer }
        filename: { type: string }

    SubmissionUpsert:
      type: object
      required:
        [name, vendor, shortDescription, longDescription, atoStatus,
         impactLevels, dataClassification, launchUrl, contactEmail]
      properties:
        name: { type: string, minLength: 1 }
        vendor: { type: string, minLength: 1 }
        shortDescription: { type: string, minLength: 1 }
        longDescription: { type: string, minLength: 1 }
        categoryId: { type: [string, 'null'] }
        atoStatus: { type: string }
        impactLevels:
          type: array
          items: { type: string }
        dataClassification: { type: string }
        launchUrl: { type: string, minLength: 1 }
        homepageUrl: { type: [string, 'null'] }
        documentationUrl: { type: [string, 'null'] }
        logoUrl: { type: [string, 'null'] }
        contactEmail: { type: string, minLength: 1, format: email }

    SubmissionSummary:
      type: object
      required:
        [id, slug, name, vendor, shortDescription, atoStatus,
         submissionStatus, submittedAt, updatedAt, reviewComment,
         reviewedAt, isVendorSubmitted]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        vendor: { type: string }
        shortDescription: { type: string }
        atoStatus: { type: string }
        submissionStatus: { type: string }
        submittedAt: { type: [string, 'null'], format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewComment: { type: [string, 'null'] }
        reviewedAt: { type: [string, 'null'], format: date-time }
        isVendorSubmitted: { type: boolean }

    SubmissionDetail:
      allOf:
        - $ref: '#/components/schemas/SubmissionSummary'
        - type: object
          required:
            [longDescription, impactLevels, dataClassification,
             launchUrl, homepageUrl, documentationUrl, logoUrl,
             contactEmail, categoryId, categorySlug, categoryName,
             submitterId, submitterDisplayName]
          properties:
            longDescription: { type: string }
            impactLevels:
              type: array
              items: { type: string }
            dataClassification: { type: string }
            launchUrl: { type: string }
            homepageUrl: { type: [string, 'null'] }
            documentationUrl: { type: [string, 'null'] }
            logoUrl: { type: [string, 'null'] }
            contactEmail: { type: [string, 'null'] }
            categoryId: { type: [string, 'null'] }
            categorySlug: { type: [string, 'null'] }
            categoryName: { type: [string, 'null'] }
            submitterId: { type: [string, 'null'] }
            submitterDisplayName: { type: [string, 'null'] }

    SubmissionReviewRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, request_changes, reject]
        comment: { type: [string, 'null'] }

    LibraryStats:
      type: object
      required: [documentCount, chunkCount, totalChars]
      properties:
        documentCount: { type: integer }
        chunkCount: { type: integer }
        totalChars: { type: integer }

    DocumentSummary:
      type: object
      required:
        [id, title, sourceFilename, mimeType, sizeBytes, charCount,
         chunkCount, status, autoSource, sourceUrl, errorMessage,
         retryCount, uploadedAt, processedAt, presetIds]
      properties:
        id: { type: string }
        title: { type: string }
        sourceFilename: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        charCount: { type: integer }
        chunkCount: { type: integer }
        status:
          type: string
          description: One of `uploaded`, `processing`, `ready`, `failed`.
        autoSource:
          type: [string, 'null']
          description: >
            Stable identifier of the auto-ingest source that produced this
            doc, e.g. "mos:army:11B" or "unit:marines:MALS-12". Null for
            documents the user uploaded by hand.
        sourceUrl:
          type: [string, 'null']
          description: Original public URL the doc was downloaded from (auto-ingest only).
        errorMessage:
          type: [string, 'null']
          description: Populated when status is `failed`.
        retryCount:
          type: integer
          description: >
            Number of times the user has manually retried processing this
            document. 0 means it has never been retried; >=1 means at least
            one retry attempt has happened (used by the UI to switch a failed
            auto-ingested row from a "Retry" button to the manual-upload
            fallback once the in-place retry has also failed).
        uploadedAt: { type: string, format: date-time }
        processedAt: { type: [string, 'null'], format: date-time }
        presetIds:
          type: array
          description: IDs of every mission preset this document is currently linked to.
          items: { type: string }

    DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/DocumentSummary'
        - type: object
          required: [chunks]
          properties:
            chunks:
              type: array
              items: { $ref: '#/components/schemas/ChunkPreview' }

    DocumentSnippet:
      type: object
      required: [documentId, title, snippet, truncated, charCount]
      properties:
        documentId: { type: string }
        title: { type: string }
        snippet:
          type: string
          description: >
            Bounded excerpt of the document's text content (the first 1–2
            chunks concatenated, capped at a server-side character budget).
        truncated:
          type: boolean
          description: >
            True when the snippet hit the character cap or the document has
            additional chunks beyond what was sampled. The UI can use this
            to render a `…` truncation marker.
        charCount:
          type: integer
          description: Length of the snippet string after capping.

    ChunkPreview:
      type: object
      required: [id, chunkIndex, content, charCount]
      properties:
        id: { type: string }
        chunkIndex: { type: integer }
        content: { type: string }
        charCount: { type: integer }

    TextDocumentUploadRequest:
      type: object
      required: [title, sourceFilename]
      properties:
        title: { type: string, minLength: 1 }
        sourceFilename: { type: string, minLength: 1 }
        mimeType: { type: string }
        content:
          type: string
          description: >
            UTF-8 plain-text body. Set this for paste-text uploads. Either
            content or storageObjectPath must be provided.
        storageObjectPath:
          type: string
          description: >
            Object storage path returned by `POST /storage/uploads/request-url`
            after the file was uploaded directly to GCS via the presigned URL.
            The server downloads the file and runs the matching extractor based
            on the file's mimeType (PDF, DOCX, MD, TXT). Either content or
            storageObjectPath must be provided.
        sizeBytes:
          type: integer
          description: >
            File size in bytes — required when storageObjectPath is set so the
            UI can display size before extraction completes.
        replacesDocumentId:
          type: string
          description: >
            Optional id of a failed auto-ingested document that this upload
            should supersede. When set, the new document inherits the failed
            row's autoSource, sourceUrl, and preset tags, and the failed row
            is deleted in the same transaction so the user only sees one
            entry. Only valid when the named document is owned by the caller,
            currently in `failed` status, and has an `autoSource` set.

    LibraryTestQueryRequest:
      type: object
      required: [query]
      properties:
        query: { type: string, minLength: 1 }
        limit: { type: integer }

    LibraryTestQueryResponse:
      type: object
      required: [query, snippets]
      properties:
        query: { type: string }
        snippets:
          type: array
          items: { $ref: '#/components/schemas/RagSnippet' }

    LaunchPreviewProfileField:
      type: object
      required: [key, label, value, hasValue]
      properties:
        key: { type: string }
        label: { type: string }
        # Stringified value (arrays joined, nulls/empty become "").
        value: { type: string }
        hasValue: { type: boolean }

    LaunchPreviewRequest:
      type: object
      description: >
        Optional body for /launch-preview (Task #88). When `launchIntent`
        is present the operator's free-form sentence becomes the primary
        RAG query and steers which snippets are surfaced; the marketplace
        debounces the typing so we only re-run the search once the
        operator pauses.
      properties:
        launchIntent: { type: [string, 'null'] }

    LaunchPreviewResponse:
      type: object
      required:
        [tool, profileFields, candidateSnippets, queries, launchPreference,
         launchIntent, selectedDoctrineDocIds, scopedToSelectedDoctrine]
      properties:
        tool:
          type: object
          required: [id, slug, name, vendor]
          properties:
            id: { type: string }
            slug: { type: string }
            name: { type: string }
            vendor: { type: string }
        profileFields:
          type: array
          items: { $ref: '#/components/schemas/LaunchPreviewProfileField' }
        candidateSnippets:
          type: array
          items: { $ref: '#/components/schemas/RagSnippet' }
        queries:
          type: array
          items: { type: string }
        launchPreference: { type: string, enum: [preview, direct] }
        # Echo of the launchIntent the server actually used (trimmed; null
        # when the operator hasn't typed anything yet) — lets the UI
        # confirm it ran the intent the operator sees in the input.
        launchIntent: { type: [string, 'null'] }
        # Doc IDs the operator ticked in the Context Block. Lets the UI
        # render "your selected doctrine: N docs" without re-parsing the
        # CB textarea client-side.
        selectedDoctrineDocIds:
          type: array
          items: { type: string }
        # True when the search was actually narrowed to selected doctrine
        # (vs falling back to the whole preset). Drives the per-snippet
        # "from selected doctrine" vs "fallback" badge.
        scopedToSelectedDoctrine: { type: boolean }

    LaunchToolRequest:
      type: object
      properties:
        # Allowlist of profile field keys to include. If omitted/null, all
        # populated fields are included (legacy "direct launch" behavior).
        selectedFieldKeys:
          oneOf:
            - type: array
              items: { type: string }
            - type: 'null'
        # Allowlist of RAG chunk IDs to include. If omitted/null, the server
        # runs RAG selection itself and includes all selected snippets.
        selectedSnippetIds:
          oneOf:
            - type: array
              items: { type: string }
            - type: 'null'
        # Optional freeform text the user wants appended to the bundle.
        additionalNote: { type: [string, 'null'] }
        # Task #88: operator's "what will you ask this tool?" sentence.
        # When present and selectedSnippetIds is null, the server re-runs
        # the same intent-led, doctrine-scoped RAG path used by the preview.
        # Persisted on the launch row so audits can show what task drove
        # this launch's snippets, and forwarded to the tool via context-
        # exchange so it can lead its UX with the operator's question.
        launchIntent: { type: [string, 'null'] }

    LaunchInitiateResponse:
      type: object
      required:
        [launchId, launchToken, launchUrl, expiresAt,
         sharedFieldKeys, sharedSnippetCount, hostingType,
         installerDownloadUrl, installerFilename, installInstructions]
      properties:
        launchId: { type: string }
        launchToken: { type: string }
        launchUrl:
          type: string
          description: >
            For cloud tools, the absolute URL to redirect the browser to.
            For local_install tools, the substituted launch URL (e.g. a custom
            protocol or http://localhost URL with the token interpolated)
            that the locally-installed app handles.
        expiresAt: { type: string, format: date-time }
        sharedFieldKeys:
          type: array
          items: { type: string }
        sharedSnippetCount: { type: integer }
        hostingType:
          type: string
          enum: [cloud, local_install]
        installerDownloadUrl:
          type: [string, 'null']
          description: Stable download URL for the installer (local_install only).
        installerFilename: { type: [string, 'null'] }
        installInstructions: { type: [string, 'null'] }

    LaunchAffirmation:
      type: object
      description: >
        Server-side record of a user's launch-time affirmation. Valid for
        ~30 minutes; covers any tool launched while the active preset id
        and context-block version still match.
      required: [presetId, contextBlockVersion, affirmedAt, expiresAt]
      properties:
        presetId: { type: string }
        contextBlockVersion: { type: integer }
        affirmedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    LaunchAffirmationStatus:
      type: object
      description: >
        Result of GET /launches/affirmation. `affirmation` is the current
        valid record (or null), and the sibling fields surface what the
        affirmation modal would render so callers can avoid a second fetch.
      required: [affirmation, presetId, contextBlockVersion]
      properties:
        affirmation:
          oneOf:
            - $ref: '#/components/schemas/LaunchAffirmation'
            - type: 'null'
        presetId:
          type: string
          description: The user's currently active preset id.
        contextBlockVersion:
          type: integer
          description: Current monotonic version of the user's context block.

    CreateLaunchAffirmationRequest:
      type: object
      required: [presetId, contextBlockVersion]
      properties:
        presetId:
          type: string
          description: Must equal the user's currently active preset id.
        contextBlockVersion:
          type: integer
          description: Must equal the current context-block version.

    LaunchNeedsAffirmation:
      type: object
      description: >
        409 payload returned when the launch endpoint refuses to mint a
        token because the user has no valid affirmation, or when the
        affirm endpoint refuses because the request is stale. Includes
        the data the affirmation modal needs to render without a follow-
        up round trip.
      required:
        [error, code, presetId, contextBlockVersion, preset, contextBlock]
      properties:
        error: { type: string }
        code:
          type: string
          enum: [needs_affirmation]
        presetId:
          type: string
          description: Active preset id at the time of the gate check.
        contextBlockVersion:
          type: integer
          description: Current context-block version at the time of the gate check.
        preset: { $ref: '#/components/schemas/MissionPreset' }
        contextBlock: { $ref: '#/components/schemas/ContextBlockState' }

    ContextExchangeRequest:
      type: object
      required: [launchToken]
      properties:
        launchToken: { type: string, minLength: 1 }

    ContextExchangeResponse:
      type: object
      required:
        [sessionToken, sessionExpiresAt, tool, user, profile, contextBlock,
         contextMarkdown, primer, additionalNote, launchIntent,
         sharedFieldKeys]
      properties:
        sessionToken: { type: string }
        sessionExpiresAt: { type: string, format: date-time }
        tool:
          type: object
          required: [id, slug, name, vendor, atoStatus]
          properties:
            id: { type: string }
            slug: { type: string }
            name: { type: string }
            vendor: { type: string }
            atoStatus: { type: string }
        user:
          type: object
          required: [id, displayName, email]
          properties:
            id: { type: string }
            displayName: { type: string }
            email: { type: [string, 'null'] }
        # Profile object — keys excluded by the user are returned as null
        # (or empty arrays), so the receiving tool keeps a stable shape.
        profile: { $ref: '#/components/schemas/UserProfile' }
        contextBlock: { $ref: '#/components/schemas/ContextBlockState' }
        contextMarkdown:
          type: string
          description: >
            Pre-formatted Markdown summary of the user's identity,
            assignment, and (when confirmed) the 6-element Context
            Block. Tool builders can drop this directly into their
            model prompt without re-parsing the structured profile or
            contextBlock objects.
        primer: { $ref: '#/components/schemas/RagPrimer' }
        # User-supplied freeform note appended at preview time.
        additionalNote: { type: [string, 'null'] }
        # Operator's launch-time intent (Task #88) — the "what will you
        # ask this tool?" sentence captured on the launch screen. Tools
        # can lead their UX with this (e.g. pre-fill a topic field).
        launchIntent: { type: [string, 'null'] }
        # Field keys the user explicitly approved (so tools can audit/log).
        sharedFieldKeys:
          type: array
          items: { type: string }

    RagPrimer:
      type: object
      required: [queries, snippets]
      properties:
        queries:
          type: array
          items: { type: string }
        snippets:
          type: array
          items: { $ref: '#/components/schemas/RagSnippet' }

    RagSnippet:
      type: object
      required:
        [chunkId, documentId, documentTitle, chunkIndex, content, score]
      properties:
        chunkId: { type: string }
        documentId: { type: string }
        documentTitle: { type: string }
        chunkIndex: { type: integer }
        content: { type: string }
        score: { type: number }
        # Task #88: true when this snippet's documentId is one of the
        # doctrine docs the operator explicitly ticked in the Context
        # Block. Lets the launch preview UI badge "from selected
        # doctrine" vs "fallback (from preset library)".
        fromSelectedDoctrine: { type: boolean }

    LibraryQueryRequest:
      type: object
      required: [sessionToken, query]
      properties:
        sessionToken: { type: string, minLength: 1 }
        query: { type: string, minLength: 1 }
        limit: { type: integer }

    LibraryQueryResponse:
      type: object
      required: [query, snippets]
      properties:
        query: { type: string }
        snippets:
          type: array
          items: { $ref: '#/components/schemas/RagSnippet' }

    AutoIngestRequest:
      type: object
      required: [source]
      properties:
        source:
          type: string
          description: 'Source identifier, e.g. "mos:army:11B" or "unit:marines:MALS-12".'

    AutoIngestSummary:
      type: object
      required: [source, total, added, existing, failed]
      properties:
        source: { type: string }
        total: { type: integer, description: Number of curated docs in the package. }
        added: { type: integer, description: Newly downloaded and ingested. }
        existing: { type: integer, description: Already present, skipped. }
        failed: { type: integer }

    AutoIngestJob:
      type: object
      required:
        [id, source, status, totalCount, addedCount, existingCount,
         failedCount, errorMessage, createdAt, updatedAt]
      properties:
        id: { type: string }
        source: { type: string }
        status: { type: string, description: '"running" | "done" | "failed"' }
        totalCount: { type: integer }
        addedCount: { type: integer }
        existingCount: { type: integer }
        failedCount: { type: integer }
        errorMessage: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AutoIngestStatusResponse:
      type: object
      required: [source, job]
      properties:
        source: { type: string }
        job:
          oneOf:
            - $ref: '#/components/schemas/AutoIngestJob'
            - type: 'null'

    BriefDraftRequest:
      type: object
      required: [sessionToken, topic, briefType]
      properties:
        sessionToken: { type: string, minLength: 1 }
        topic:
          type: string
          minLength: 1
          description: One-line topic the brief should cover.
        briefType:
          type: string
          enum: [sitrep, opord_paragraph, training_brief]
          description: Which brief format to draft.
        audience:
          type: [string, 'null']
          description: Optional audience override (e.g. "battalion commander").

    BriefDraft:
      type: object
      required: [briefType, topic, draft, snippets, queries]
      properties:
        briefType: { type: string }
        topic: { type: string }
        draft:
          type: string
          description: The generated brief in Markdown.
        queries:
          type: array
          description: Library queries used to pull supporting snippets.
          items: { type: string }
        snippets:
          type: array
          description: Snippets the model was asked to draw on.
          items: { $ref: '#/components/schemas/RagSnippet' }

    LaunchHistoryItem:
      type: object
      required:
        [id, toolId, toolName, toolSlug, status, createdAt,
         sharedFieldKeys, sharedSnippets, additionalNote, launchIntent]
      properties:
        id: { type: string }
        toolId: { type: string }
        toolName: { type: string }
        toolSlug: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        sharedFieldKeys:
          type: array
          items: { type: string }
        sharedSnippets:
          type: array
          items: { $ref: '#/components/schemas/RagSnippet' }
        additionalNote: { type: [string, 'null'] }
        # Task #88: operator's "what will you ask this tool?" sentence
        # captured on the launch screen. Surfaced in the audit log so
        # admins / auditors can see what task drove this launch.
        launchIntent: { type: [string, 'null'] }

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file.
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    DashboardSummary:
      type: object
      required:
        [profileCompletenessPct, libraryDocumentCount, libraryChunkCount,
         favoritesCount, launchCount, recentLaunches, atoStatusBreakdown,
         topTools]
      properties:
        profileCompletenessPct: { type: integer }
        libraryDocumentCount: { type: integer }
        libraryChunkCount: { type: integer }
        favoritesCount: { type: integer }
        launchCount: { type: integer }
        recentLaunches:
          type: array
          items: { $ref: '#/components/schemas/LaunchHistoryItem' }
        atoStatusBreakdown:
          type: array
          items:
            type: object
            required: [atoStatus, count]
            properties:
              atoStatus: { type: string }
              count: { type: integer }
        topTools:
          type: array
          items: { $ref: '#/components/schemas/ToolSummary' }

    PresetProfileSnapshot:
      type: object
      required:
        [branch, rank, mosCode, dutyTitle, unit, baseLocation,
         securityClearance, deploymentStatus, command, billets,
         freeFormContext]
      properties:
        branch: { type: [string, 'null'] }
        rank: { type: [string, 'null'] }
        mosCode: { type: [string, 'null'] }
        dutyTitle: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        baseLocation: { type: [string, 'null'] }
        securityClearance: { type: [string, 'null'] }
        deploymentStatus: { type: [string, 'null'] }
        command:
          type: [string, 'null']
          description: >
            Combatant command code (e.g. USINDOPACOM, USCYBERCOM, OTHER).
        billets:
          type: array
          description: Billet titles the operator currently holds.
          items: { type: string }
        freeFormContext: { type: [string, 'null'] }

    MissionPreset:
      type: object
      required:
        [id, name, description, profileSnapshot, documentIds, isActive,
         createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: [string, 'null'] }
        profileSnapshot: { $ref: '#/components/schemas/PresetProfileSnapshot' }
        documentIds:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MissionPresetCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        profileSnapshot:
          oneOf:
            - $ref: '#/components/schemas/PresetProfileSnapshot'
            - type: 'null'
        documentIds:
          type: array
          items: { type: string }
        activate: { type: boolean }

    MissionPresetUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        profileSnapshot:
          oneOf:
            - $ref: '#/components/schemas/PresetProfileSnapshot'
            - type: 'null'
        documentIds:
          type: array
          items: { type: string }

    PresetDeleteResponse:
      type: object
      required: [success, activePresetId]
      properties:
        success: { type: boolean }
        activePresetId: { type: string }

    DocumentPresetTagsUpdate:
      type: object
      required: [presetIds]
      properties:
        presetIds:
          type: array
          items: { type: string }

    ToolReview:
      type: object
      required:
        [id, toolId, rating, comment, reviewerBranch, reviewerRank,
         createdAt, updatedAt, isMine]
      properties:
        id: { type: string }
        toolId: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: [string, 'null'] }
        reviewerBranch: { type: [string, 'null'] }
        reviewerRank: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        isMine: { type: boolean }

    ToolReviewListResponse:
      type: object
      required: [reviews, total, avgRating, hasMore, myReview, canReview]
      properties:
        reviews:
          type: array
          items: { $ref: '#/components/schemas/ToolReview' }
        total:
          type: integer
          description: Total number of visible reviews.
        avgRating:
          type: [number, 'null']
          description: Average rating across visible reviews, or null when there are none.
        hasMore: { type: boolean }
        myReview:
          oneOf:
            - $ref: '#/components/schemas/ToolReview'
            - type: 'null'
        canReview:
          type: boolean
          description: True when the current user has launched the tool and is signed in (so may post a review).

    ToolReviewUpsert:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment:
          type: [string, 'null']
          maxLength: 500

    AdminToolReview:
      type: object
      required:
        [id, toolId, toolName, toolSlug, userId, reviewerEmail,
         reviewerBranch, reviewerRank, rating, comment, isHidden,
         hiddenReason, hiddenAt, hiddenBy, createdAt, updatedAt]
      properties:
        id: { type: string }
        toolId: { type: string }
        toolName: { type: string }
        toolSlug: { type: string }
        userId: { type: string }
        reviewerEmail: { type: [string, 'null'] }
        reviewerBranch: { type: [string, 'null'] }
        reviewerRank: { type: [string, 'null'] }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: [string, 'null'] }
        isHidden: { type: boolean }
        hiddenReason: { type: [string, 'null'] }
        hiddenAt: { type: [string, 'null'], format: date-time }
        hiddenBy: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdminReviewListResponse:
      type: object
      required: [reviews, total, hasMore]
      properties:
        reviews:
          type: array
          items: { $ref: '#/components/schemas/AdminToolReview' }
        total: { type: integer }
        hasMore: { type: boolean }

    AdminHideReviewRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
          maxLength: 500

    AdminContextBlockConfirmation:
      type: object
      required:
        [userId, displayName, email, branch, rank, isAdmin, hasConfirmed,
         confirmedAt, scoreTotal, status, opsecFlag, submissionId]
      properties:
        userId: { type: string }
        displayName: { type: string }
        email: { type: [string, 'null'] }
        branch: { type: [string, 'null'] }
        rank: { type: [string, 'null'] }
        isAdmin: { type: boolean }
        hasConfirmed:
          type: boolean
          description: True if the user has ever confirmed a Context Block.
        confirmedAt:
          type: [string, 'null']
          format: date-time
          description: Timestamp of the user's most recent Context Block confirmation.
        scoreTotal:
          type: [integer, 'null']
          description: Evaluator score of the most recent confirmation, /12.
        status:
          type: [string, 'null']
          description: '"GO" or "NO-GO" from the most recent evaluation.'
        opsecFlag:
          type: boolean
          description: True if the most recent confirmation tripped the OPSEC fail-safe.
        submissionId:
          type: [string, 'null']
          description: Submission ID of the most recent confirmation.

    AdminContextBlockConfirmationsResponse:
      type: object
      required: [users, totals]
      properties:
        users:
          type: array
          items: { $ref: '#/components/schemas/AdminContextBlockConfirmation' }
        totals:
          type: object
          required:
            [totalUsers, confirmedUsers, unconfirmedUsers, opsecFlaggedUsers,
             noGoUsers]
          properties:
            totalUsers: { type: integer }
            confirmedUsers: { type: integer }
            unconfirmedUsers: { type: integer }
            opsecFlaggedUsers: { type: integer }
            noGoUsers: { type: integer }
